%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------

Camera.fx: 7.188560000000e+02
Camera.fy: 7.188560000000e+02
Camera.cx: 6.071928000000e+02
Camera.cy: 1.852157000000e+02

Camera.k1: 0
Camera.k2: 0
Camera.p1: 0
Camera.p2: 0

Camera.fps: 22.0
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# NEC Parameters
#--------------------------------------------------------------------------------------------
PNEC.NEC: 1

PNEC.noiseFrame: "Target"
PNEC.regularization: 1.0e-13
PNEC.covarianceMode: "Original"
PNEC.isotropicCovarianceValue: 1.0e-6
PNEC.normalizedCovarianceTrace: 1.0
PNEC.dumpCovarianceStats: 0
PNEC.weightedIterations: 10

PNEC.SCF: 1
PNEC.weightedRotationUpdateMode: "ScaledBearing"
PNEC.ceresInitMode: "Weighted"
PNEC.ceres: 1

PNEC.ransac: 1
PNEC.RANSACThreshold: 1.0e-6
PNEC.maxRANSACIterations: 5000
PNEC.RANSACSampleSize: 10

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

ORBextractor.imgWidth: 1382
ORBextractor.imgHeight: 512
ORBextractor.xDivide: 1
ORBextractor.yDivide: 1
PNEC.minLocalRad: 5.0

ORBextractor.nFeatures: 4000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.1
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 1
Viewer.PointSize:2
Viewer.CameraSize: 0.15
Viewer.CameraLineWidth: 2
Viewer.ViewpointX: 0
Viewer.ViewpointY: -10
Viewer.ViewpointZ: -0.1
Viewer.ViewpointF: 2000
